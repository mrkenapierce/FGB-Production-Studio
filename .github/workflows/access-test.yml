name: Generate Assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://github.com/mrkenapierce/FGB-Production-Studio.git repo
          cd repo
          npm install
          npm run assets
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dist-assets
          git commit -m "Generate assets" || echo "No asset changes"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/mrkenapierce/FGB-Production-Studio.git
          git push origin HEAD:main
