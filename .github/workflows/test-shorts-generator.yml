name: Test Produced Shorts Generator

on:
  pull_request:
    paths:
      - 'scripts/generate-produced-shorts.mjs'
      - 'test/shorts-generator.test.mjs'
      - 'package.json'
      - '.github/workflows/test-shorts-generator.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/generate-produced-shorts.mjs'
      - 'test/shorts-generator.test.mjs'
      - 'package.json'
      - '.github/workflows/test-shorts-generator.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:shorts
